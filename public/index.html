<!DOCTYPE html>
<html>
  <head>
    <title>Example of the Authorization Code flow with Spotify</title>
    <link
      rel="stylesheet"
      href="//netdna.bootstrapcdn.com/bootstrap/3.1.1/css/bootstrap.min.css"
    />
    <style type="text/css">
      #login,
      #loggedin {
        display: none;
      }
      .text-overflow {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        width: 500px;
      }
    </style>
    <script src="http://code.jquery.com/jquery-1.10.1.min.js"></script>
  </head>

  <body>
    <div class="container">
      <div id="login">
        <h1>This is an example of the Authorization Code flow</h1>
        <a href="/login" class="btn btn-primary">Log in with Spotify</a>
      </div>
      <div id="loggedin">
        <div id="user-profile"></div>
        <div id="oauth"></div>
        <button class="btn btn-default" id="obtain-new-token">
          Obtain new token using the refresh token
        </button>
      </div>
    </div>
    <!-- New Commit  start -->
    <div
      class="container"
      id="artist-search-container"
      style="margin-top: 30px"
    >
      <h3>Search for Artists</h3>
      <input
        type="text"
        id="artist-search"
        class="form-control"
        placeholder="Type artist name..."
        autocomplete="off"
      />
      <ul
        id="artist-suggestions"
        class="list-group"
        style="position: absolute; z-index: 1000; width: 500px; display: none"
      ></ul>
      <h4>Selected Artists</h4>
      <ul id="selected-artists" class="list-group"></ul>
      <button
        class="btn btn-success"
        id="get-recommendation"
        style="margin-top: 15px"
      >
        Get Recommendations
      </button>
      <div id="recommendation-results" style="margin-top: 20px"></div>
    </div>
    <script>
      (function () {
        var access_token = null;
        var debounceTimeout = null;
        var $search = $("#artist-search");
        var $suggestions = $("#artist-suggestions");
        var $selected = $("#selected-artists");
        var selectedArtists = [];

        // Get access_token from oauth info if available
        function getAccessToken() {
          var params = {};
          var e,
            r = /([^&;=]+)=?([^&;]*)/g,
            q = window.location.hash.substring(1);
          while ((e = r.exec(q))) params[e[1]] = decodeURIComponent(e[2]);
          return params.access_token || null;
        }
        access_token = getAccessToken();
        console.log("Access Token:", access_token);

        function renderSuggestions(artists) {
          $suggestions.empty();
          if (artists.length === 0) {
            $suggestions.hide();
            return;
          }
          artists.forEach(function (artist) {
            var $item = $("<li>")
              .addClass("list-group-item")
              .css("cursor", "pointer")
              .text(artist.name)
              .attr("data-id", artist.id)
              .attr("data-name", artist.name);
            $suggestions.append($item);
          });
          $suggestions.show();
        }

        function renderSelectedArtists() {
          $selected.empty();
          selectedArtists.forEach(function (artist, idx) {
            var $item = $("<li>")
              .addClass("list-group-item")
              .text(artist.name + " ")
              .append(
                $("<button>")
                  .addClass("btn btn-xs btn-danger pull-right remove-artist")
                  .text("Remove")
                  .attr("data-idx", idx)
              );
            $selected.append($item);
          });
        }

        $search.on("input", function () {
          var query = $search.val().trim();
          clearTimeout(debounceTimeout);
          if (!query || !access_token) {
            $suggestions.hide();
            return;
          }
          debounceTimeout = setTimeout(function () {
            $.ajax({
              url: "https://api.spotify.com/v1/search",
              headers: { Authorization: "Bearer " + access_token },
              data: { q: query, type: "artist", limit: 5 },
              success: function (data) {
                var artists =
                  data.artists && data.artists.items ? data.artists.items : [];
                renderSuggestions(artists);
              },
              error: function () {
                $suggestions.hide();
              },
            });
          }, 300);
        });

        // Hide suggestions when clicking outside
        $(document).on("click", function (e) {
          if (!$(e.target).closest("#artist-search-container").length) {
            $suggestions.hide();
          }
        });

        // Add artist on suggestion click
        $suggestions.on("click", "li", function () {
          var id = $(this).attr("data-id");
          var name = $(this).attr("data-name");
          if (
            !selectedArtists.some(function (a) {
              return a.id === id;
            })
          ) {
            selectedArtists.push({ id: id, name: name });
            renderSelectedArtists();
          }
          $suggestions.hide();
          $search.val("");
        });

        // Remove artist
        $selected.on("click", ".remove-artist", function () {
          var idx = $(this).attr("data-idx");
          selectedArtists.splice(idx, 1);
          renderSelectedArtists();
        });
        $("#get-recommendation").on("click", function () {
          if (!access_token) {
            alert("You must be logged in to get recommendations.");
            return;
          }
          if (selectedArtists.length === 0) {
            alert("Please select at least one artist.");
            return;
          }

          $.ajax({
            url: "/recommendations",
            method: "POST",
            contentType: "application/json",
            data: JSON.stringify({ artists: selectedArtists }),
            headers: { Authorization: "Bearer " + access_token },
            success: function (response) {
              var html = "";
              if (response && response.length > 0) {
                html += "<h4>Recommended Artists</h4><ul class='list-group'>";
                response.forEach(function (artistName) {
                  html += "<li class='list-group-item'>" + artistName + "</li>";
                });
                html += "</ul>";
              } else {
                html =
                  "<div class='alert alert-info'>No recommendations found.</div>";
              }
              $("#recommendation-results").html(html);
            },
            error: function (xhr) {
              var msg = "Failed to get recommendations.";
              if (xhr.responseJSON && xhr.responseJSON.error) {
                msg += " " + xhr.responseJSON.error;
              }
              $("#recommendation-results").html(
                "<div class='alert alert-danger'>" + msg + "</div>"
              );
            },
          });
        });
      })();
    </script>
    <!-- New Commit end -->

    <script id="user-profile-template" type="text/x-handlebars-template">
      <h1>Logged in as {{display_name}}</h1>
      <div class="media">
        <div class="pull-left">
          <img class="media-object" width="150" src="{{images.0.url}}" />
        </div>
        <div class="media-body">
          <dl class="dl-horizontal">
            <dt>Display name</dt><dd class="clearfix">{{display_name}}</dd>
            <dt>Id</dt><dd>{{id}}</dd>
            <dt>Email</dt><dd>{{email}}</dd>
            <dt>Spotify URI</dt><dd><a
                href="{{external_urls.spotify}}"
              >{{external_urls.spotify}}</a></dd>
            <dt>Link</dt><dd><a href="{{href}}">{{href}}</a></dd>
            <dt>Profile Image</dt><dd class="clearfix"><a
                href="{{images.0.url}}"
              >{{images.0.url}}</a></dd>
            <dt>Country</dt><dd>{{country}}</dd>
          </dl>
        </div>
      </div>
    </script>

    <script id="oauth-template" type="text/x-handlebars-template">
      <h2>oAuth info</h2>
      <dl class="dl-horizontal">
        <dt>Access token</dt><dd class="text-overflow">{{access_token}}</dd>
        <dt>Refresh token</dt><dd class="text-overflow">{{refresh_token}}</dd>
      </dl>
    </script>

    <script src="//cdnjs.cloudflare.com/ajax/libs/handlebars.js/2.0.0-alpha.1/handlebars.min.js"></script>

    <script>
      (function () {
        /**
         * Obtains parameters from the hash of the URL
         * @return Object
         */
        function getHashParams() {
          var hashParams = {};
          var e,
            r = /([^&;=]+)=?([^&;]*)/g,
            q = window.location.hash.substring(1);
          while ((e = r.exec(q))) {
            hashParams[e[1]] = decodeURIComponent(e[2]);
          }
          return hashParams;
        }

        var userProfileSource = document.getElementById(
            "user-profile-template"
          ).innerHTML,
          userProfileTemplate = Handlebars.compile(userProfileSource),
          userProfilePlaceholder = document.getElementById("user-profile");

        var oauthSource = document.getElementById("oauth-template").innerHTML,
          oauthTemplate = Handlebars.compile(oauthSource),
          oauthPlaceholder = document.getElementById("oauth");

        var params = getHashParams();

        var access_token = params.access_token,
          refresh_token = params.refresh_token,
          error = params.error;

        if (error) {
          alert("There was an error during the authentication");
        } else {
          if (access_token) {
            // render oauth info
            oauthPlaceholder.innerHTML = oauthTemplate({
              access_token: access_token,
              refresh_token: refresh_token,
            });

            $.ajax({
              url: "https://api.spotify.com/v1/me",
              headers: {
                Authorization: "Bearer " + access_token,
              },
              success: function (response) {
                userProfilePlaceholder.innerHTML =
                  userProfileTemplate(response);

                $("#login").hide();
                $("#loggedin").show();
              },
            });
          } else {
            // render initial screen
            $("#login").show();
            $("#loggedin").hide();
          }

          document.getElementById("obtain-new-token").addEventListener(
            "click",
            function () {
              $.ajax({
                url: "/refresh_token",
                data: {
                  refresh_token: refresh_token,
                },
              }).done(function (data) {
                access_token = data.access_token;
                oauthPlaceholder.innerHTML = oauthTemplate({
                  access_token: access_token,
                  refresh_token: refresh_token,
                });
              });
            },
            false
          );
        }
      })();
    </script>
  </body>
</html>
